/* ============================================================
   STORAGE — two interchangeable backends:
   FolderStore  : real files via the File System Access API
                  (the folder IS the filing system / backup)
   IdbStore     : IndexedDB fallback (works in any browser)
   ============================================================ */

var DB_NAME = 'sas-db', DB_VERSION = 1;

function openDb() {
  return new Promise(function (res, rej) {
    var req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function () {
      var db = req.result;
      if (!db.objectStoreNames.contains('posts')) db.createObjectStore('posts', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('media')) db.createObjectStore('media');
      if (!db.objectStoreNames.contains('thumbs')) db.createObjectStore('thumbs');
      if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
    };
    req.onsuccess = function () { res(req.result); };
    req.onerror = function () { rej(req.error || new Error('Could not open browser storage.')); };
  });
}

function idbReq(req) {
  return new Promise(function (res, rej) {
    req.onsuccess = function () { res(req.result); };
    req.onerror = function () { rej(req.error); };
  });
}

function idbTx(db, stores, mode, fn) {
  return new Promise(function (res, rej) {
    var tx = db.transaction(stores, mode);
    var out;
    tx.oncomplete = function () { res(out); };
    tx.onerror = function () { rej(tx.error); };
    tx.onabort = function () { rej(tx.error || new Error('Storage transaction aborted.')); };
    out = fn(tx);
  });
}

function sanitizeFileName(name) {
  name = String(name || 'file').replace(/[\/\\:*?"<>|\u0000-\u001F]/g, '_').replace(/\s+/g, '_').trim();
  if (name === '' || name === '.' || name === '..') name = 'file';
  return name.slice(0, 120);
}

/* ---------------- IndexedDB backend ---------------- */
function IdbStore() { this.kind = 'browser'; this.db = null; }

IdbStore.prototype.init = function () {
  var self = this;
  return openDb().then(function (db) { self.db = db; return self; });
};

IdbStore.prototype.listPosts = function () {
  var self = this;
  return idbTx(self.db, ['posts'], 'readonly', function (tx) {
    return idbReq(tx.objectStore('posts').getAll());
  }).then(function (rows) {
    return { posts: (rows || []).map(normalizePost), problems: [] };
  });
};

IdbStore.prototype.savePost = function (post, newMedia) {
  var self = this;
  post.updatedAt = new Date().toISOString();
  var clean = JSON.parse(JSON.stringify(post));
  return idbTx(self.db, ['posts', 'media'], 'readwrite', function (tx) {
    tx.objectStore('posts').put(clean);
    if (newMedia) {
      newMedia.forEach(function (blob, name) {
        tx.objectStore('media').put(blob, post.id + '/' + name);
      });
    }
  }).then(function () { return post; });
};

IdbStore.prototype.deletePost = function (post) {
  var self = this;
  return idbTx(self.db, ['posts', 'media', 'thumbs'], 'readwrite', function (tx) {
    tx.objectStore('posts').delete(post.id);
    tx.objectStore('thumbs').delete(post.id);
    (post.media || []).forEach(function (m) {
      tx.objectStore('media').delete(post.id + '/' + m.file);
    });
  });
};

IdbStore.prototype.removeMediaFile = function (post, name) {
  var self = this;
  return idbTx(self.db, ['media'], 'readwrite', function (tx) {
    tx.objectStore('media').delete(post.id + '/' + name);
  });
};

IdbStore.prototype.getMediaBlob = function (post, name) {
  var self = this;
  return idbTx(self.db, ['media'], 'readonly', function (tx) {
    return idbReq(tx.objectStore('media').get(post.id + '/' + name));
  }).then(function (b) { return b || null; });
};

IdbStore.prototype.putThumb = function (postId, blob) {
  var self = this;
  return idbTx(self.db, ['thumbs'], 'readwrite', function (tx) {
    tx.objectStore('thumbs').put(blob, postId);
  });
};

IdbStore.prototype.getThumb = function (postId) {
  var self = this;
  return idbTx(self.db, ['thumbs'], 'readonly', function (tx) {
    return idbReq(tx.objectStore('thumbs').get(postId));
  }).then(function (b) { return b || null; });
};

IdbStore.prototype.getSettings = function () {
  var self = this;
  return idbTx(self.db, ['kv'], 'readonly', function (tx) {
    return idbReq(tx.objectStore('kv').get('settings'));
  }).then(function (s) { return s || null; });
};

IdbStore.prototype.saveSettings = function (s) {
  var self = this;
  var clean = JSON.parse(JSON.stringify(s));
  return idbTx(self.db, ['kv'], 'readwrite', function (tx) {
    tx.objectStore('kv').put(clean, 'settings');
  });
};

IdbStore.prototype.label = function () { return 'Browser storage'; };

/* ---------------- File System Access backend ---------------- */
function FolderStore(rootHandle) {
  this.kind = 'folder';
  this.root = rootHandle;
  this.contentDir = null;
  this.dirOf = {};   /* postId -> { handle, name } */
}

FolderStore.isSupported = function () {
  return typeof window !== 'undefined' && 'showDirectoryPicker' in window;
};

/* remember / recall the chosen folder across sessions (handle lives in IDB) */
FolderStore.saveHandle = function (handle) {
  return openDb().then(function (db) {
    return idbTx(db, ['kv'], 'readwrite', function (tx) {
      tx.objectStore('kv').put(handle, 'dirHandle');
    });
  });
};

FolderStore.loadHandle = function () {
  return openDb().then(function (db) {
    return idbTx(db, ['kv'], 'readonly', function (tx) {
      return idbReq(tx.objectStore('kv').get('dirHandle'));
    });
  }).catch(function () { return null; });
};

FolderStore.forgetHandle = function () {
  return openDb().then(function (db) {
    return idbTx(db, ['kv'], 'readwrite', function (tx) {
      tx.objectStore('kv').delete('dirHandle');
    });
  }).catch(function () {});
};

FolderStore.prototype.init = function () {
  var self = this;
  return self.root.getDirectoryHandle('content', { create: true }).then(function (d) {
    self.contentDir = d;
    return self;
  });
};

FolderStore.prototype.label = function () { return this.root.name || 'Connected folder'; };

function readDirEntries(dirHandle) {
  var out = [];
  var it = dirHandle.entries();
  function step() {
    return it.next().then(function (r) {
      if (r.done) return out;
      out.push(r.value);
      return step();
    });
  }
  return step();
}

FolderStore.prototype.listPosts = function () {
  var self = this;
  var posts = [], problems = [];
  self.dirOf = {};
  return readDirEntries(self.contentDir).then(function (entries) {
    var dirs = entries.filter(function (e) { return e[1].kind === 'directory'; });
    return dirs.reduce(function (chain, e) {
      var name = e[0], handle = e[1];
      return chain.then(function () {
        return handle.getFileHandle('post.json').then(function (fh) {
          return fh.getFile();
        }).then(function (f) {
          return f.text();
        }).then(function (txt) {
          var raw = JSON.parse(txt);
          var p = normalizePost(raw);
          if (self.dirOf[p.id]) { problems.push('Duplicate post id in “content/' + name + '” — skipped.'); return; }
          self.dirOf[p.id] = { handle: handle, name: name };
          posts.push(p);
        }).catch(function (err) {
          if (err && err.name === 'NotFoundError') return; /* not a post folder; leave it alone */
          problems.push('Couldn’t read “content/' + name + '”: ' + (err && err.message ? err.message : err));
        });
      });
    }, Promise.resolve()).then(function () {
      return { posts: posts, problems: problems };
    });
  });
};

function writeFileTo(dirHandle, name, data) {
  return dirHandle.getFileHandle(name, { create: true }).then(function (fh) {
    return fh.createWritable();
  }).then(function (w) {
    return w.write(data).then(function () { return w.close(); });
  });
}

function buildHumanFiles(post) {
  /* plain-text files so every post can be published by hand from the folder */
  var files = {};
  var lines = [];
  lines.push('POST: ' + (post.title || '(untitled)'));
  lines.push('WHEN: ' + (post.when.local ? post.when.local.replace('T', ' at ') : 'not set') + ' (' + (post.when.tz || '') + ')');
  lines.push('STATUS: ' + post.status);
  lines.push('TYPE: ' + post.format);
  lines.push('PLATFORMS: ' + (post.platforms.join(', ') || 'none'));
  if (post.label) lines.push('LABEL: ' + post.label);
  if (post.notes) lines.push('NOTES: ' + post.notes);
  if ((post.media || []).length) lines.push('MEDIA: ' + post.media.map(function (m) { return m.file; }).join(', '));
  lines.push('');
  lines.push('Made with Socials Auto Scheduler — this folder contains everything needed to post manually.');
  files['INFO.txt'] = lines.join('\n');

  files['caption.txt'] = post.caption || '';
  post.platforms.forEach(function (pid) {
    if (pid === 'youtube') {
      var yt = effectiveYouTube(post);
      files['youtube.txt'] = 'TITLE: ' + yt.title + '\n\nDESCRIPTION:\n' + yt.description + '\n\nTAGS: ' + yt.tags;
    } else {
      var v = variantOf(post, pid);
      if (v.caption) files['caption-' + pid + '.txt'] = v.caption;
      if (pid === 'instagram' && v.firstComment) files['first-comment-instagram.txt'] = v.firstComment;
    }
  });
  return files;
}

FolderStore.prototype.savePost = function (post, newMedia) {
  var self = this;
  post.updatedAt = new Date().toISOString();
  var wanted = folderNameFor(post);
  var existing = self.dirOf[post.id];

  function uniqueName(base) {
    var tryName = base, suffix = 98; /* b, c, d… */
    function exists(n) {
      return self.contentDir.getDirectoryHandle(n).then(function () { return true; }, function () { return false; });
    }
    function attempt() {
      return exists(tryName).then(function (yes) {
        if (!yes) return tryName;
        if (existing && existing.name === tryName) return tryName; /* it's ours */
        tryName = base + '-' + String.fromCharCode(suffix++);
        if (suffix > 122) tryName = base + '-' + Math.random().toString(36).slice(2, 6);
        return attempt();
      });
    }
    return attempt();
  }

  function writeAll(dirHandle) {
    var json = JSON.stringify(post, null, 2);
    var human = buildHumanFiles(post);
    var ops = [writeFileTo(dirHandle, 'post.json', json)];
    Object.keys(human).forEach(function (name) {
      ops.push(writeFileTo(dirHandle, name, human[name]));
    });
    if (newMedia) {
      newMedia.forEach(function (blob, name) {
        ops.push(writeFileTo(dirHandle, name, blob));
      });
    }
    return Promise.all(ops).then(function () {
      /* sweep stale helper files (e.g. caption-instagram.txt after the
         Instagram override was removed) so the folder always tells the truth */
      return readDirEntries(dirHandle).then(function (entries) {
        var sweeps = [];
        entries.forEach(function (e) {
          var name = e[0];
          if (e[1].kind !== 'file') return;
          var isHelper = /^caption-[a-z0-9-]+\.txt$/.test(name) ||
            name === 'youtube.txt' || name === 'first-comment-instagram.txt';
          if (isHelper && !(name in human)) {
            sweeps.push(dirHandle.removeEntry(name).catch(function () {}));
          }
        });
        return Promise.all(sweeps);
      });
    });
  }

  function copyDir(fromHandle, toHandle) {
    return readDirEntries(fromHandle).then(function (entries) {
      return entries.reduce(function (chain, e) {
        return chain.then(function () {
          if (e[1].kind !== 'file') return;
          return e[1].getFile().then(function (f) {
            return writeFileTo(toHandle, e[0], f);
          });
        });
      }, Promise.resolve());
    });
  }

  if (!existing) {
    return uniqueName(wanted).then(function (name) {
      return self.contentDir.getDirectoryHandle(name, { create: true }).then(function (d) {
        self.dirOf[post.id] = { handle: d, name: name };
        return writeAll(d);
      });
    }).then(function () { return post; });
  }

  if (existing.name === wanted) {
    return writeAll(existing.handle).then(function () { return post; });
  }

  /* date/title changed -> move folder (copy then delete; FS API has no rename) */
  return uniqueName(wanted).then(function (name) {
    if (name === existing.name) return writeAll(existing.handle).then(function () { return post; });
    return self.contentDir.getDirectoryHandle(name, { create: true }).then(function (newDir) {
      return copyDir(existing.handle, newDir).then(function () {
        return writeAll(newDir);
      }).then(function () {
        return self.contentDir.removeEntry(existing.name, { recursive: true });
      }).then(function () {
        self.dirOf[post.id] = { handle: newDir, name: name };
        return post;
      });
    });
  });
};

FolderStore.prototype.deletePost = function (post) {
  var self = this;
  var entry = self.dirOf[post.id];
  if (!entry) return Promise.resolve();
  return self.contentDir.removeEntry(entry.name, { recursive: true }).then(function () {
    delete self.dirOf[post.id];
  });
};

FolderStore.prototype.removeMediaFile = function (post, name) {
  var self = this;
  var entry = self.dirOf[post.id];
  if (!entry) return Promise.resolve();
  return entry.handle.removeEntry(sanitizeFileName(name)).catch(function () {});
};

FolderStore.prototype.getMediaBlob = function (post, name) {
  var self = this;
  var entry = self.dirOf[post.id];
  if (!entry) return Promise.resolve(null);
  return entry.handle.getFileHandle(sanitizeFileName(name)).then(function (fh) {
    return fh.getFile();
  }).catch(function () { return null; });
};

FolderStore.prototype.putThumb = function (postId, blob) {
  var entry = this.dirOf[postId];
  if (!entry) return Promise.resolve();
  return writeFileTo(entry.handle, '_thumb.jpg', blob);
};

FolderStore.prototype.getThumb = function (postId) {
  var entry = this.dirOf[postId];
  if (!entry) return Promise.resolve(null);
  return entry.handle.getFileHandle('_thumb.jpg').then(function (fh) {
    return fh.getFile();
  }).catch(function () { return null; });
};

FolderStore.prototype.getSettings = function () {
  var self = this;
  return self.root.getFileHandle('settings.json').then(function (fh) {
    return fh.getFile();
  }).then(function (f) { return f.text(); })
    .then(function (t) { return JSON.parse(t); })
    .catch(function () { return null; });
};

FolderStore.prototype.saveSettings = function (s) {
  return writeFileTo(this.root, 'settings.json', JSON.stringify(s, null, 2));
};

/* read the freshest post.json from disk (conflict detection with autopilot) */
FolderStore.prototype.peekPost = function (postId) {
  var entry = this.dirOf[postId];
  if (!entry) return Promise.resolve(null);
  return entry.handle.getFileHandle('post.json').then(function (fh) {
    return fh.getFile();
  }).then(function (f) { return f.text(); })
    .then(function (t) { return normalizePost(JSON.parse(t)); })
    .catch(function () { return null; });
};

IdbStore.prototype.peekPost = function (postId) {
  var self = this;
  return idbTx(self.db, ['posts'], 'readonly', function (tx) {
    return idbReq(tx.objectStore('posts').get(postId));
  }).then(function (p) { return p ? normalizePost(p) : null; });
};

/* ============================================================
   Cloud auto-publish — sends scheduled posts straight to the
   GitHub repo so the autopilot robot posts them. No GitHub Desktop.
   The repo + token live in localStorage only, so they are never
   written into the synced folder and never committed anywhere.
   ============================================================ */
var Cloud = {
  cfg: null,            /* { repo:'owner/name', token:'…', branch:'main' } */
  queue: [],            /* folder names still waiting to push (auto-retried) */
  knownSha: {},         /* repo path -> last-seen blob sha (skip unchanged on pull) */

  load: function () {
    try { this.cfg = JSON.parse(localStorage.getItem('sas-cloud') || 'null'); } catch (e) { this.cfg = null; }
    try { this.queue = JSON.parse(localStorage.getItem('sas-cloud-queue') || '[]'); } catch (e) { this.queue = []; }
    try { this.knownSha = JSON.parse(localStorage.getItem('sas-cloud-sha') || '{}'); } catch (e) { this.knownSha = {}; }
  },
  persist: function () { try { localStorage.setItem('sas-cloud', JSON.stringify(this.cfg)); } catch (e) {} },
  persistQueue: function () { try { localStorage.setItem('sas-cloud-queue', JSON.stringify(this.queue)); } catch (e) {} },
  persistSha: function () { try { localStorage.setItem('sas-cloud-sha', JSON.stringify(this.knownSha)); } catch (e) {} },

  configured: function () { return !!(this.cfg && this.cfg.repo && this.cfg.token && /^[^/]+\/[^/]+$/.test(this.cfg.repo)); },
  ownerRepo: function () { var p = this.cfg.repo.split('/'); return { owner: p[0], repo: p[1] }; },
  branch: function () { return (this.cfg && this.cfg.branch) || 'main'; },

  api: function (path, opts) {
    opts = opts || {};
    var headers = {
      'Authorization': 'Bearer ' + this.cfg.token,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    };
    if (opts.body) headers['Content-Type'] = 'application/json';
    return fetch('https://api.github.com' + path, {
      method: opts.method || 'GET', headers: headers,
      body: opts.body ? JSON.stringify(opts.body) : undefined
    }).then(function (r) {
      return r.text().then(function (t) {
        var j = {}; try { j = t ? JSON.parse(t) : {}; } catch (e) { j = { _raw: t }; }
        if (!r.ok) { var err = new Error((j && j.message) || ('GitHub HTTP ' + r.status)); err.status = r.status; err.body = j; throw err; }
        return j;
      });
    });
  },

  ping: function () { var or = this.ownerRepo(); return this.api('/repos/' + or.owner + '/' + or.repo); },

  folderName: function (post) {
    return (App.store.dirOf && App.store.dirOf[post.id] && App.store.dirOf[post.id].name) || folderNameFor(post);
  },

  blobB64: function (blob) {
    return new Promise(function (res, rej) {
      var r = new FileReader();
      r.onload = function () { var s = String(r.result); var i = s.indexOf(','); res(i >= 0 ? s.slice(i + 1) : s); };
      r.onerror = function () { rej(r.error || new Error('read failed')); };
      r.readAsDataURL(blob);
    });
  },

  fileSetFor: function (post) {
    /* the exact files savePost writes: post.json + helper texts + media */
    var files = [{ name: 'post.json', blob: new Blob([JSON.stringify(post, null, 2)], { type: 'application/json' }) }];
    var human = buildHumanFiles(post);
    Object.keys(human).forEach(function (n) { files.push({ name: n, blob: new Blob([human[n]], { type: 'text/plain' }) }); });
    var chain = Promise.resolve();
    (post.media || []).forEach(function (m) {
      chain = chain.then(function () {
        return App.store.getMediaBlob(post, m.file).then(function (b) { if (b) files.push({ name: m.file, blob: b }); });
      });
    });
    return chain.then(function () { return files; });
  },

  treeUnder: function (prefix) {
    var or = this.ownerRepo();
    return this.api('/repos/' + or.owner + '/' + or.repo + '/git/trees/' + this.branch() + '?recursive=1').then(function (t) {
      return (t.tree || []).filter(function (e) { return e.type === 'blob' && e.path.indexOf(prefix) === 0; }).map(function (e) { return e.path; });
    }).catch(function () { return []; });
  },

  commit: function (message, addFiles, deletePaths, attempt) {
    var self = this, or = this.ownerRepo(), base = '/repos/' + or.owner + '/' + or.repo, branch = this.branch();
    attempt = attempt || 1;
    var baseCommitSha, baseTreeSha;
    return self.api(base + '/git/ref/heads/' + branch).then(function (ref) {
      baseCommitSha = ref.object.sha; return self.api(base + '/git/commits/' + baseCommitSha);
    }).then(function (c) {
      baseTreeSha = c.tree.sha;
      return (addFiles || []).reduce(function (chain, f) {
        return chain.then(function (acc) {
          return self.blobB64(f.blob).then(function (b64) {
            return self.api(base + '/git/blobs', { method: 'POST', body: { content: b64, encoding: 'base64' } }).then(function (bl) {
              acc.push({ path: f.path, mode: '100644', type: 'blob', sha: bl.sha }); return acc;
            });
          });
        });
      }, Promise.resolve([]));
    }).then(function (treeAdds) {
      var tree = treeAdds.concat((deletePaths || []).map(function (p) { return { path: p, mode: '100644', type: 'blob', sha: null }; }));
      if (!tree.length) return null;
      return self.api(base + '/git/trees', { method: 'POST', body: { base_tree: baseTreeSha, tree: tree } }).then(function (t) {
        return self.api(base + '/git/commits', { method: 'POST', body: { message: message, tree: t.sha, parents: [baseCommitSha] } });
      }).then(function (nc) {
        return self.api(base + '/git/refs/heads/' + branch, { method: 'PATCH', body: { sha: nc.sha, force: false } });
      });
    }).catch(function (err) {
      /* the robot may have advanced the branch between read and write — rebase by retrying */
      if (attempt < 4 && err && (err.status === 409 || err.status === 422)) {
        return new Promise(function (r) { setTimeout(r, 400 * attempt); }).then(function () { return self.commit(message, addFiles, deletePaths, attempt + 1); });
      }
      throw err;
    });
  },

  pushPost: function (post, oldFolderName) {
    var self = this;
    if (!self.configured()) return Promise.resolve({ skipped: true });
    var folder = self.folderName(post);
    return self.fileSetFor(post).then(function (files) {
      var adds = files.map(function (f) { return { path: 'content/' + folder + '/' + f.name, blob: f.blob }; });
      var delP = (oldFolderName && oldFolderName !== folder) ? self.treeUnder('content/' + oldFolderName + '/') : Promise.resolve([]);
      return delP.then(function (dels) { return self.commit('Schedule “' + (post.title || folder) + '” via app', adds, dels); });
    });
  },

  deleteFolder: function (folderName) {
    var self = this;
    if (!self.configured() || !folderName) return Promise.resolve();
    return self.treeUnder('content/' + folderName + '/').then(function (paths) {
      if (!paths.length) return null;
      return self.commit('Remove “' + folderName + '” via app', [], paths);
    });
  },

  enqueue: function (folder) { if (this.queue.indexOf(folder) < 0) { this.queue.push(folder); this.persistQueue(); } },
  dequeue: function (folder) { var i = this.queue.indexOf(folder); if (i >= 0) { this.queue.splice(i, 1); this.persistQueue(); } },

  /* called right after a post is saved locally */
  onSaved: function (post, oldFolderName) {
    var self = this;
    if (!self.configured()) return;
    setCloudStatus('syncing');
    self.pushPost(post, oldFolderName).then(function () {
      self.dequeue(post.id); setCloudStatus('ok');
      toast('☁︎ Sent to the cloud — the robot will post it', 'ok');
    }).catch(function (err) {
      self.enqueue(post.id); setCloudStatus('err', err && err.message);
      toast('Couldn’t reach the cloud — saved locally, will retry. (' + (err && err.message ? err.message : 'error') + ')', 'err');
    });
  },
  onDeleted: function (folderName) {
    var self = this;
    if (!self.configured()) return;
    self.deleteFolder(folderName).catch(function () {});
  },

  /* push only the posts that failed before (cheap; runs on load/focus) */
  retryQueue: function () {
    var self = this;
    if (!self.configured() || !self.queue.length) return Promise.resolve();
    setCloudStatus('syncing');
    var ids = self.queue.slice();
    return ids.reduce(function (chain, id) {
      return chain.then(function () {
        var p = App.posts.find(function (x) { return x.id === id; });
        if (!p) { self.dequeue(id); return; }
        return self.pushPost(p).then(function () { self.dequeue(id); }).catch(function () {});
      });
    }, Promise.resolve()).then(function () { setCloudStatus(self.queue.length ? 'err' : 'ok'); });
  },

  /* full reconcile: push every local post, then pull statuses (manual button) */
  syncAll: function () {
    var self = this;
    if (!self.configured()) return Promise.reject(new Error('Cloud isn’t set up yet.'));
    setCloudStatus('syncing');
    self.queue = []; self.persistQueue();
    return App.posts.slice().reduce(function (chain, p) {
      return chain.then(function () { return self.pushPost(p).catch(function () { self.enqueue(p.id); }); });
    }, Promise.resolve()).then(function () { return self.pullStatuses(); }).then(function () {
      setCloudStatus(self.queue.length ? 'err' : 'ok');
    }).catch(function (err) { setCloudStatus('err', err && err.message); throw err; });
  },

  pullStatuses: function () {
    var self = this;
    if (!self.configured()) return Promise.resolve();
    var or = self.ownerRepo();
    function b64ToUtf8(b64) {
      var bin = atob(String(b64).replace(/\s/g, '')), bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      try { return new TextDecoder('utf-8').decode(bytes); } catch (e) { return bin; }
    }
    return self.api('/repos/' + or.owner + '/' + or.repo + '/git/trees/' + self.branch() + '?recursive=1').then(function (t) {
      var jsons = (t.tree || []).filter(function (e) { return e.type === 'blob' && /^content\/[^/]+\/post\.json$/.test(e.path); });
      var changed = jsons.filter(function (e) { return self.knownSha[e.path] !== e.sha; });
      return changed.reduce(function (chain, e) {
        return chain.then(function () {
          return self.api('/repos/' + or.owner + '/' + or.repo + '/git/blobs/' + e.sha).then(function (bl) {
            var rp; try { rp = JSON.parse(b64ToUtf8(bl.content)); } catch (er) { return; }
            self.knownSha[e.path] = e.sha;
            var local = App.posts.find(function (x) { return x.id === rp.id; });
            if (local && (!App.editing || App.editing.id !== local.id)) {
              if (rp.status && rp.status !== local.status) local.status = rp.status;
              if (rp.results) local.results = rp.results;
            }
          }).catch(function () {});
        });
      }, Promise.resolve()).then(function () { self.persistSha(); render(); });
    }).catch(function () {});
  }
};

function setCloudStatus(state, msg) {
  var chip = document.getElementById('cloudChip');
  if (!chip) return;
  if (!Cloud.configured()) { chip.style.display = 'none'; return; }
  chip.style.display = '';
  var q = Cloud.queue.length;
  var base = 'display:inline-flex;align-items:center;gap:4px;cursor:pointer;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:600;border:1px solid;';
  if (state === 'syncing') { chip.style.cssText = base + 'background:#1f2937;border-color:#374151;color:#cbd5e1'; chip.textContent = '☁︎ Syncing…'; chip.title = 'Sending your posts to the cloud…'; }
  else if (state === 'err') { chip.style.cssText = base + 'background:#3b1d1d;border-color:#7f1d1d;color:#fca5a5'; chip.textContent = '⚠︎ Cloud retry' + (q ? ' (' + q + ')' : ''); chip.title = (msg || 'Sync failed') + ' — click to retry now'; }
  else { chip.style.cssText = base + 'background:#10241b;border-color:#14532d;color:#86efac'; chip.textContent = q ? ('☁︎ ' + q + ' to sync') : '☁︎ Auto-publish on'; chip.title = 'Posts sync to the cloud automatically. Click for cloud settings.'; }
}

/* ============================================================
   UI — application state, calendar/list rendering, filtering.
   ============================================================ */

var App = {
  store: null,
  posts: [],
  settings: null,
  view: 'month',
  cursor: new Date(),
  filters: { platform: '', status: '', label: '', q: '' },
  editing: null,
  editingOriginalUpdatedAt: null,
  editingIsNew: false,
  newMedia: new Map(),
  thumbUrls: {},
  previewUrls: [],
  activeVTab: null,
  dueShownIds: {},
  dueDismissedIds: {},
  bootDone: false
};

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return Array.prototype.slice.call(document.querySelectorAll(sel)); }
function esc(s) { return escapeHtml(s); }

function defaultSettings() {
  var tz = 'UTC';
  try { tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC'; } catch (e) {}
  return {
    tz: tz,
    labels: [
      { name: 'Promo', color: '#f472b6' },
      { name: 'Tips', color: '#60a5fa' },
      { name: 'Behind the scenes', color: '#facc15' }
    ],
    hashGroups: [],
    customPlatforms: [],
    lastBackup: null,
    notifiedIds: {}
  };
}

function allPlatforms() {
  var customs = ((App.settings && App.settings.customPlatforms) || []).map(function (c) {
    return { id: c.id, name: c.name, color: c.color || '#9aa4b8', short: (c.name || '?').slice(0, 2).toUpperCase(), custom: true };
  });
  return BUILTIN_PLATFORMS.concat(customs);
}

function platformById(pid) {
  return allPlatforms().find(function (p) { return p.id === pid; }) ||
    { id: pid, name: pid, color: '#9aa4b8', short: '?', custom: true };
}

function platformDisplayName(pid) { return platformById(pid).name; }

function fmtTime12(localIsoStr) {
  var p = parseLocalISO(localIsoStr);
  if (!p) return '';
  var h = p.h % 12 === 0 ? 12 : p.h % 12;
  return h + ':' + pad2(p.mi) + ' ' + (p.h < 12 ? 'AM' : 'PM');
}

function fmtHour12(h) {
  var hh = h % 12 === 0 ? 12 : h % 12;
  return hh + (h < 12 ? 'am' : 'pm');
}

var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DOWS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function dateKeyFromDate(d) {
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}

function todayKey() { return dateKeyFromDate(new Date()); }

function fmtDateHuman(dateKey) {
  var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(dateKey);
  if (!m) return dateKey;
  var d = new Date(+m[1], +m[2] - 1, +m[3]);
  return DOWS[d.getDay()] + ', ' + MONTHS_S[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

/* ---------------- filtering ---------------- */
function matchesFilters(post) {
  var f = App.filters;
  if (f.platform && (post.platforms || []).indexOf(f.platform) < 0) return false;
  if (f.status) {
    if (f.status === 'overdue') {
      if (dueState(post, Date.now()) !== 'overdue') return false;
    } else if (post.status !== f.status) return false;
  }
  if (f.label && post.label !== f.label) return false;
  if (f.q) {
    var q = f.q.toLowerCase();
    var hay = [post.title, post.caption, post.notes, post.label];
    Object.keys(post.variants || {}).forEach(function (k) {
      var v = post.variants[k] || {};
      hay.push(v.caption, v.title, v.description, v.firstComment);
    });
    if (hay.join(' ').toLowerCase().indexOf(q) < 0) return false;
  }
  return true;
}

function visiblePosts() { return App.posts.filter(matchesFilters); }

function postsByDate(posts) {
  var map = {};
  posts.forEach(function (p) {
    var k = dateKeyOf(p.when && p.when.local) || 'unscheduled';
    (map[k] = map[k] || []).push(p);
  });
  Object.keys(map).forEach(function (k) {
    map[k].sort(function (a, b) { return (a.when.local || '').localeCompare(b.when.local || ''); });
  });
  return map;
}

function effectiveStatusClass(post) {
  var ds = dueState(post, Date.now());
  if (ds === 'overdue') return 's-overdue';
  return 's-' + post.status;
}

function statusBadge(post) {
  var ds = dueState(post, Date.now());
  if (ds === 'overdue') return '<span class="statusbadge sb-overdue">Overdue</span>';
  if (ds === 'due') return '<span class="statusbadge sb-overdue">Due now</span>';
  var partial = post.status === 'scheduled' && Object.keys(post.results || {}).some(function (k) { return post.results[k] && post.results[k].ok; });
  if (partial) return '<span class="statusbadge sb-scheduled">Partly posted</span>';
  return '<span class="statusbadge sb-' + post.status + '">' + post.status.charAt(0).toUpperCase() + post.status.slice(1) + '</span>';
}

function platformDotsHtml(post) {
  return '<span class="pdots">' + (post.platforms || []).map(function (pid) {
    var p = platformById(pid);
    var cls = ['instagram','facebook','tiktok','youtube'].indexOf(pid) >= 0 ? pid : 'custom';
    var style = cls === 'custom' ? ' style="background:' + esc(p.color) + '"' : '';
    return '<span class="pdot ' + cls + '"' + style + ' title="' + esc(p.name) + '"></span>';
  }).join('') + '</span>';
}

function labelPillHtml(post) {
  if (!post.label) return '';
  var l = (App.settings.labels || []).find(function (x) { return x.name === post.label; });
  var color = l ? l.color : '#9aa4b8';
  return '<span class="labelpill" style="background:' + esc(color) + '">' + esc(post.label) + '</span>';
}

function thumbHtml(post, sizeClass) {
  var f = (FORMATS.find(function (x) { return x.id === post.format; }) || {});
  return '<span class="thumb" data-thumb="' + esc(post.id) + '">' + (f.icon || '📄') + '</span>';
}

/* after each render, hydrate thumbnails asynchronously */
function hydrateThumbs() {
  $$('[data-thumb]').forEach(function (elx) {
    var id = elx.getAttribute('data-thumb');
    if (App.thumbUrls[id] === undefined) {
      App.thumbUrls[id] = null; /* in flight */
      App.store.getThumb(id).then(function (blob) {
        if (blob) App.thumbUrls[id] = URL.createObjectURL(blob);
        else App.thumbUrls[id] = '';
        applyThumb(id);
      }).catch(function () { App.thumbUrls[id] = ''; });
    } else {
      applyThumb(id);
    }
  });
}

function applyThumb(id) {
  var url = App.thumbUrls[id];
  if (!url) return;
  $$('[data-thumb="' + id + '"]').forEach(function (elx) {
    if (!elx.querySelector('img')) {
      var img = document.createElement('img');
      img.alt = '';
      img.src = url;
      elx.textContent = '';
      elx.appendChild(img);
    }
  });
}

function invalidateThumb(id) {
  if (App.thumbUrls[id]) { try { URL.revokeObjectURL(App.thumbUrls[id]); } catch (e) {} }
  delete App.thumbUrls[id];
}

/* ---------------- post card ---------------- */
function pcardHtml(post, opts) {
  opts = opts || {};
  var draggable = ['published'].indexOf(post.status) < 0;
  var html = '<div class="pcard ' + effectiveStatusClass(post) + '" data-post="' + esc(post.id) + '"' +
    (draggable ? ' draggable="true"' : '') + ' title="' + esc(post.title || 'Untitled post') + '">' +
    thumbHtml(post) +
    '<div class="meta">' +
      '<div class="row1"><span class="time">' + esc(fmtTime12(post.when.local) || '—') + '</span>' +
        platformDotsHtml(post) + labelPillHtml(post) + '</div>' +
      '<div class="title">' + esc(post.title || firstLine(post.caption) || 'Untitled') + '</div>' +
      (opts.caption ? '<div class="wk-card-cap">' + esc(post.caption || '') + '</div>' : '') +
    '</div>' +
  '</div>';
  return html;
}

function firstLine(s) {
  return String(s || '').split('\n')[0].slice(0, 60);
}

/* ---------------- month view ---------------- */
function renderMonth() {
  var y = App.cursor.getFullYear(), mo = App.cursor.getMonth();
  $('#navLabel').textContent = MONTHS[mo] + ' ' + y;
  var first = new Date(y, mo, 1);
  var start = new Date(y, mo, 1 - first.getDay());
  var daysInMonth = new Date(y, mo + 1, 0).getDate();
  var totalCells = Math.ceil((first.getDay() + daysInMonth) / 7) * 7;
  var byDate = postsByDate(visiblePosts());
  var tKey = todayKey();
  var html = '<div class="cal-month">';
  DOWS.forEach(function (d) { html += '<div class="dow">' + d + '</div>'; });

  for (var i = 0; i < totalCells; i++) {
    var d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    var key = dateKeyFromDate(d);
    var inMonth = d.getMonth() === mo;
    var cards = byDate[key] || [];
    var cls = 'cal-cell' + (inMonth ? '' : ' other') + (key === tKey ? ' today' : '');
    html += '<div class="' + cls + '" data-date="' + key + '">' +
      '<div class="cellhead"><span class="daynum">' + d.getDate() + '</span>' +
      '<button class="addday" data-add="' + key + '" title="New post on ' + esc(fmtDateHuman(key)) + '">+</button></div>';
    var maxShow = 3;
    cards.slice(0, maxShow).forEach(function (p) { html += pcardHtml(p); });
    if (cards.length > maxShow) {
      html += '<button class="more" data-more="' + key + '">+' + (cards.length - maxShow) + ' more</button>';
    }
    html += '</div>';
  }
  html += '</div>';
  $('#main').innerHTML = html;
  wireCalendarCells();
  hydrateThumbs();
}

/* ---------------- week view ---------------- */
function renderWeek() {
  var c = new Date(App.cursor.getFullYear(), App.cursor.getMonth(), App.cursor.getDate());
  var start = new Date(c.getFullYear(), c.getMonth(), c.getDate() - c.getDay());
  var end = new Date(start.getFullYear(), start.getMonth(), start.getDate() + 6);
  var label = MONTHS_S[start.getMonth()] + ' ' + start.getDate() + ' – ' +
    (end.getMonth() === start.getMonth() ? '' : MONTHS_S[end.getMonth()] + ' ') + end.getDate() + ', ' + end.getFullYear();
  $('#navLabel').textContent = label;
  var byDate = postsByDate(visiblePosts());
  var tKey = todayKey();
  var html = '<div class="cal-week">';
  for (var i = 0; i < 7; i++) {
    var d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    var key = dateKeyFromDate(d);
    var cards = byDate[key] || [];
    html += '<div class="wk-col' + (key === tKey ? ' today' : '') + '" data-date="' + key + '">' +
      '<div class="colhead"><span class="d">' + d.getDate() + '</span><span class="m">' + DOWS[d.getDay()] + '</span>' +
      '<span style="flex:1"></span><button class="addday" data-add="' + key + '" style="opacity:1" title="New post">+</button></div>';
    if (!cards.length) html += '<div class="muted small" style="text-align:center;padding:14px 0">—</div>';
    cards.forEach(function (p) { html += pcardHtml(p, { caption: true }); });
    html += '</div>';
  }
  html += '</div>';
  $('#main').innerHTML = html;
  wireCalendarCells();
  hydrateThumbs();
}

/* ---------------- list view ---------------- */
function renderList() {
  $('#navLabel').textContent = 'All posts';
  var posts = visiblePosts().slice().sort(function (a, b) {
    return (a.when.local || '9999').localeCompare(b.when.local || '9999');
  });
  if (!posts.length) {
    $('#main').innerHTML = '<div class="empty"><div class="big">🗓️</div>' +
      '<p style="font-size:16px;font-weight:600;margin-bottom:6px">' +
      (App.posts.length ? 'Nothing matches those filters.' : 'No posts yet.') + '</p>' +
      '<p>' + (App.posts.length ? 'Try clearing the filters above.' : 'Hit <b>+ New Post</b> to plan your first one.') + '</p></div>';
    return;
  }
  var groups = {}, order = [];
  posts.forEach(function (p) {
    var k = dateKeyOf(p.when.local) || 'No date yet';
    if (!groups[k]) { groups[k] = []; order.push(k); }
    groups[k].push(p);
  });
  var html = '<div class="listview">';
  order.forEach(function (k) {
    html += '<div class="lv-group"><h3>' + esc(/^\d{4}/.test(k) ? fmtDateHuman(k) : k) + '</h3>';
    groups[k].forEach(function (p) {
      html += '<div class="lv-row ' + effectiveStatusClass(p) + '" data-post="' + esc(p.id) + '">' +
        '<span class="thumb" data-thumb="' + esc(p.id) + '">' + ((FORMATS.find(function (x) { return x.id === p.format; }) || {}).icon || '📄') + '</span>' +
        '<div class="main">' +
          '<div style="display:flex;align-items:center;gap:8px">' + platformDotsHtml(p) +
            '<b>' + esc(p.title || firstLine(p.caption) || 'Untitled') + '</b>' + labelPillHtml(p) + '</div>' +
          '<div class="cap">' + esc(firstLine(p.caption) || 'No caption') + '</div>' +
        '</div>' +
        '<div class="when"><div class="t">' + esc(fmtTime12(p.when.local) || '') + '</div>' +
          '<div class="muted small">' + ((p.media || []).length ? (p.media.length + ' file' + (p.media.length > 1 ? 's' : '')) : 'no media') + '</div></div>' +
        statusBadge(p) +
      '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  $('#main').innerHTML = html;
  $$('#main .lv-row').forEach(function (row) {
    row.addEventListener('click', function () { openComposer(row.getAttribute('data-post')); });
  });
  hydrateThumbs();
}

/* ---------------- shared cell wiring (click, add, drag-drop) ---------------- */
function wireCalendarCells() {
  $$('#main .pcard').forEach(function (card) {
    card.addEventListener('click', function (e) {
      e.stopPropagation();
      openComposer(card.getAttribute('data-post'));
    });
    card.addEventListener('dragstart', function (e) {
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.getAttribute('data-post'));
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', function () { card.classList.remove('dragging'); });
  });
  $$('#main [data-add]').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      openComposer(null, btn.getAttribute('data-add'));
    });
  });
  $$('#main [data-more]').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      openDayModal(btn.getAttribute('data-more'));
    });
  });
  $$('#main [data-date]').forEach(function (cell) {
    cell.addEventListener('dragover', function (e) { e.preventDefault(); cell.classList.add('dragover'); });
    cell.addEventListener('dragleave', function () { cell.classList.remove('dragover'); });
    cell.addEventListener('drop', function (e) {
      e.preventDefault();
      cell.classList.remove('dragover');
      var id = e.dataTransfer.getData('text/plain');
      if (id) movePostToDate(id, cell.getAttribute('data-date'));
    });
  });
}

function movePostToDate(postId, dateKey) {
  var post = App.posts.find(function (p) { return p.id === postId; });
  if (!post || !dateKey) return;
  var oldKey = dateKeyOf(post.when.local);
  if (oldKey === dateKey) return;
  var time = (post.when.local || '').slice(11) || '12:00';
  var newLocal = dateKey + 'T' + time;
  var proceed = function () {
    post.when.local = newLocal;
    saveExistingPost(post).then(function () {
      toast('Moved to ' + fmtDateHuman(dateKey), 'ok');
      render();
    }).catch(function (err) { toast('Couldn’t move post: ' + err.message, 'err'); render(); });
  };
  if (post.status === 'scheduled' && zonedToUtcMs(newLocal, post.when.tz || App.settings.tz) < Date.now()) {
    confirmModal('Move to a past time?', 'That date and time has already passed, so this post would immediately show as overdue. Move it anyway?', 'Move it').then(function (yes) { if (yes) proceed(); });
  } else {
    proceed();
  }
}

function openDayModal(dateKey) {
  var byDate = postsByDate(visiblePosts());
  var cards = byDate[dateKey] || [];
  var body = cards.map(function (p) { return pcardHtml(p); }).join('') || '<p class="muted">No posts.</p>';
  showModal(fmtDateHuman(dateKey), body, [
    { label: '+ New post this day', primary: true, onClick: function () { closeModal(); openComposer(null, dateKey); } }
  ]);
  $$('#modalBody .pcard').forEach(function (card) {
    card.addEventListener('click', function () {
      closeModal();
      openComposer(card.getAttribute('data-post'));
    });
  });
  hydrateThumbs();
}

/* ---------------- top-level render ---------------- */
function render() {
  var nav = $('.navdate');
  nav.style.visibility = App.view === 'list' ? 'hidden' : 'visible';
  if (App.view === 'month') renderMonth();
  else if (App.view === 'week') renderWeek();
  else renderList();
  renderCountInfo();
  renderDueBanner();
}

function renderCountInfo() {
  var vis = visiblePosts();
  var sched = vis.filter(function (p) { return p.status === 'scheduled'; }).length;
  var need = vis.filter(function (p) {
    var ds = dueState(p, Date.now());
    return ds === 'due' || ds === 'overdue' || p.status === 'failed';
  }).length;
  $('#countInfo').textContent = vis.length + ' post' + (vis.length === 1 ? '' : 's') +
    (sched ? ' · ' + sched + ' scheduled' : '') +
    (need ? ' · ' + need + ' need attention' : '');
}

function populateFilters() {
  var pSel = $('#fltPlatform');
  var keep = pSel.value;
  pSel.innerHTML = '<option value="">All platforms</option>' + allPlatforms().map(function (p) {
    return '<option value="' + esc(p.id) + '">' + esc(p.name) + '</option>';
  }).join('');
  pSel.value = keep;
  var lSel = $('#fltLabel');
  keep = lSel.value;
  lSel.innerHTML = '<option value="">All labels</option>' + (App.settings.labels || []).map(function (l) {
    return '<option value="' + esc(l.name) + '">' + esc(l.name) + '</option>';

/* ---------------- toasts & modals ---------------- */
function toast(msg, kind) {
  var t = document.createElement('div');
  t.className = 'toast' + (kind ? ' ' + kind : '');
  t.textContent = msg;
  $('#toasts').appendChild(t);
  setTimeout(function () { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; }, 3200);
  setTimeout(function () { t.remove(); }, 3600);
}

var _modalButtons = [];
function showModal(title, bodyHtml, buttons) {
  $('#modalTitle').textContent = title;
  $('#modalBody').innerHTML = bodyHtml;
  var foot = $('#modalFoot');
  foot.innerHTML = '';
  _modalButtons = buttons || [];
  _modalButtons.forEach(function (b) {
    var btn = document.createElement('button');
    btn.className = 'btn' + (b.primary ? ' primary' : '') + (b.danger ? ' danger' : '');
    btn.textContent = b.label;
    btn.addEventListener('click', b.onClick);
    foot.appendChild(btn);
  });
  $('#modalWrap').classList.add('open');
}

function closeModal() { $('#modalWrap').classList.remove('open'); }

function confirmModal(title, text, okLabel) {
  return new Promise(function (res) {
    showModal(title, '<p>' + esc(text) + '</p>', [
      { label: 'Cancel', onClick: function () { closeModal(); res(false); } },
      { label: okLabel || 'OK', primary: true, onClick: function () { closeModal(); res(true); } }
    ]);
  });
}

/* ============================================================
   COMPOSER — the post editor drawer.
   ============================================================ */

var _validateTimer = null;
var _dirty = false;
var _removedMedia = [];
var _stagedThumb;        /* undefined = untouched, Blob = new thumb, null = clear */

function openComposer(postId, dateKey) {
  var post;
  if (postId) {
    var existing = App.posts.find(function (p) { return p.id === postId; });
    if (!existing) return;
    post = normalizePost(JSON.parse(JSON.stringify(existing)));
    App.editingIsNew = false;
    App.editingOriginalUpdatedAt = existing.updatedAt;
  } else {
    post = newPost(App.settings.tz, dateKey || todayKey());
    post.platforms = allPlatforms().slice(0, 4).map(function (p) { return p.id; }).filter(function (id) {
      return ['instagram', 'facebook', 'tiktok'].indexOf(id) >= 0; /* sensible default selection */
    });
    App.editingIsNew = true;
    App.editingOriginalUpdatedAt = null;
  }
  App.editing = post;
  App.newMedia = new Map();
  _removedMedia = [];
  _stagedThumb = undefined;
  _dirty = false;
  _pendingSchedule = false;
  App.activeVTab = null;
  revokePreviews();

  $('#drawerTitle').textContent = postId ? 'Edit post' : 'New post';
  $('#fTitle').value = post.title || '';
  $('#fDate').value = dateKeyOf(post.when.local) || '';
  $('#fTime').value = (post.when.local || '').slice(11, 16) || '12:00';
  $('#fCaption').value = post.caption || '';
  $('#fNotes').value = post.notes || '';
  renderLabelSelect();
  $('#fLabel').value = post.label || '';
  $('#deleteBtn').classList.toggle('hidden', App.editingIsNew);
  $('#duplicateBtn').classList.toggle('hidden', App.editingIsNew);

  renderDrawerStatus();
  renderPlatGrid();
  renderFormatRow();
  renderVTabs();
  renderHashBar();
  renderBestTimes();
  renderMediaRow();
  runValidation();
  updateCounters();
  updateFooterButtons();
  $('#saveHint').textContent = '';

  $('#scrim').classList.add('open');
  $('#drawer').classList.add('open');
  setTimeout(function () { $('#fTitle').focus(); }, 220);
}

function closeComposer(force) {
  function reallyClose() {
    $('#scrim').classList.remove('open');
    $('#drawer').classList.remove('open');
    App.editing = null;
    revokePreviews();
  }
  if (_dirty && !force) {
    confirmModal('Discard changes?', 'You have unsaved changes on this post. Close without saving?', 'Discard').then(function (yes) {
      if (yes) reallyClose();
    });
  } else {
    reallyClose();
  }
}

function markDirty() {
  _dirty = true;
  $('#saveHint').textContent = 'Unsaved changes';
  if (_validateTimer) clearTimeout(_validateTimer);
  _validateTimer = setTimeout(function () { runValidation(); }, 250);
}

function renderDrawerStatus() {
  var p = App.editing;
  var badge = $('#drawerStatus');
  var ds = dueState(p, Date.now());
  var label = ds === 'overdue' ? 'Overdue' : p.status.charAt(0).toUpperCase() + p.status.slice(1);
  badge.className = 'statusbadge ' + (ds === 'overdue' ? 'sb-overdue' : 'sb-' + p.status);
  badge.textContent = label;
}

function updateFooterButtons() {
  var p = App.editing;
  var isPub = p.status === 'published';
  $('#scheduleBtn').classList.toggle('hidden', isPub);
  $('#saveReadyBtn').classList.toggle('hidden', isPub);
  $('#saveDraftBtn').textContent = isPub ? 'Save changes' : (p.status === 'scheduled' ? 'Back to draft' : 'Save draft');
  $('#scheduleBtn').textContent = p.status === 'scheduled' ? 'Update schedule' : 'Schedule';
}

/* ---------------- platforms ---------------- */
function renderPlatGrid() {
  var p = App.editing;
  var grid = $('#platGrid');
  grid.innerHTML = allPlatforms().map(function (pl) {
    var on = p.platforms.indexOf(pl.id) >= 0;
    var cls = ['instagram','facebook','tiktok','youtube'].indexOf(pl.id) >= 0 ? pl.id : 'custom';
    var dotStyle = cls === 'custom' ? ' style="background:' + esc(pl.color) + '"' : '';
    return '<button type="button" class="plat-toggle ' + cls + (on ? ' on' : '') + '" data-plat="' + esc(pl.id) + '">' +
      '<span class="pdot ' + cls + '"' + dotStyle + '></span>' + esc(pl.name) + '</button>';
  }).join('');
  $$('#platGrid .plat-toggle').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var id = btn.getAttribute('data-plat');
      var i = App.editing.platforms.indexOf(id);
      if (i >= 0) App.editing.platforms.splice(i, 1);
      else App.editing.platforms.push(id);
      markDirty();
      renderPlatGrid(); renderVTabs(); renderBestTimes(); renderFormatRow(); updateCounters();
    });
  });
}

/* ---------------- format ---------------- */
function renderFormatRow() {
  var p = App.editing;
  var row = $('#formatRow');
  row.innerHTML = FORMATS.map(function (f) {
    var unsupported = p.platforms.filter(function (pid) {
      var pf = PLATFORM_FORMATS[pid];

    }).map(platformDisplayName);

      f.icon + ' ' + esc(f.name) + (unsupported.length && p.format === f.id ? ' ⚠' : '') + '</button>';
  }).join('');
  $$('#formatRow .fmt').forEach(function (btn) {
    btn.addEventListener('click', function () {
      App.editing.format = btn.getAttribute('data-fmt');
      markDirty();
      renderFormatRow();
    });
  });
}

/* ---------------- caption, counters, hashtags ---------------- */
function updateCounters() {
  var p = App.editing;
  var box = $('#capCounters');
  var parts = [];
  p.platforms.forEach(function (pid) {
    if (pid === 'youtube') {
      var yt = effectiveYouTube(p);
      var t = countChars(yt.title), d = countChars(yt.description);
      parts.push('<span><b>YT</b> title <span class="' + (t > LIMITS.youtube.title ? 'over' : '') + '">' + t + '/' + LIMITS.youtube.title + '</span>' +
        ' · desc <span class="' + (d > LIMITS.youtube.desc ? 'over' : '') + '">' + d + '/' + LIMITS.youtube.desc + '</span></span>');
      return;
    }
    var lim = LIMITS[pid];
    var pl = platformById(pid);
    var cap = effectiveCaption(p, pid);
    var n = countChars(cap);
    if (!lim) { parts.push('<span><b>' + esc(pl.short) + '</b> ' + n + '</span>'); return; }
    var cls = n > lim.caption ? 'over' : (lim.truncate && n > lim.truncate ? 'warn' : '');
    var extra = '';
    if (pid === 'instagram') {
      var v = variantOf(p, 'instagram');
      var tags = extractHashtags(cap).length + extractHashtags(v.firstComment || '').length;
      extra = ' · <span class="' + (tags > 30 ? 'over' : '') + '">#' + tags + '</span>';
    }
    parts.push('<span><b>' + esc(pl.short) + '</b> <span class="' + cls + '">' + n + '/' + lim.caption + '</span>' + extra + '</span>');
  });
  box.innerHTML = parts.join(' &nbsp;·&nbsp; ') || '<span class="muted">Select platforms to see limits</span>';
}

function renderHashBar() {
  var bar = $('#hashBar');
  var groups = App.settings.hashGroups || [];
  var html = groups.map(function (g, i) {
    return '<button type="button" class="hash-chip" data-hash="' + i + '" title="' + esc(g.tags) + '"># ' + esc(g.name) + '</button>';
  }).join('');
  html += '<button type="button" class="hash-chip" data-hash="manage" style="opacity:.7">✎ hashtag sets</button>';
  bar.innerHTML = html;
  $$('#hashBar .hash-chip').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var key = btn.getAttribute('data-hash');
      if (key === 'manage') { openSettings('hashtags'); return; }
      var g = App.settings.hashGroups[+key];
      if (!g) return;
      var ta = $('#fCaption');
      var cur = ta.value.replace(/\s+$/, '');
      ta.value = cur + (cur ? '\n\n' : '') + g.tags;
      App.editing.caption = ta.value;
      markDirty(); updateCounters();
    });
  });
}

/* ---------------- best times ---------------- */
function renderBestTimes() {
  var p = App.editing;
  var box = $('#bestTimes');
  var dk = $('#fDate').value;
  if (!dk || !p.platforms.length) {
    box.innerHTML = '<span class="muted small">Pick platforms & date first</span>';
    return;
  }
  var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(dk);
  if (!m) { box.innerHTML = ''; return; }
  var dow = new Date(+m[1], +m[2] - 1, +m[3]).getDay();
  var chips = [];
  p.platforms.forEach(function (pid) {
    var bt = BEST_TIMES[pid];
    if (!bt) return;
    var pl = platformById(pid);
    (bt[dow] || []).forEach(function (slot) {
      chips.push({ pid: pid, short: pl.short, h: slot.h, top: !!slot.top });
    });
  });
  if (!chips.length) { box.innerHTML = '<span class="muted small">No data for these platforms</span>'; return; }
  chips.sort(function (a, b) { return a.h - b.h || (b.top - a.top); });
  box.innerHTML = chips.map(function (c) {
    return '<button type="button" class="bt-chip" data-hour="' + c.h + '">' +
      (c.top ? '<span class="star">★</span>' : '') + esc(c.short) + ' ' + fmtHour12(c.h) + '</button>';
  }).join('');
  $$('#bestTimes .bt-chip').forEach(function (btn) {
    btn.addEventListener('click', function () {
      $('#fTime').value = pad2(+btn.getAttribute('data-hour')) + ':00';
      syncWhen();
      markDirty();
    });
  });
}

function syncWhen() {
  var d = $('#fDate').value, t = $('#fTime').value;
  App.editing.when.local = (d && t) ? d + 'T' + t : '';
  if (!App.editing.when.tz) App.editing.when.tz = App.settings.tz;
}

/* ---------------- per-platform variant tabs ---------------- */
function renderVTabs() {
  var p = App.editing;
  var tabs = $('#vTabs');
  if (!p.platforms.length) {
    tabs.innerHTML = '<span class="muted small" style="padding:8px 0">Select platforms above to customize per network</span>';
    $('#vPanel').innerHTML = '';
    App.activeVTab = null;
    return;
  }
  if (!App.activeVTab || p.platforms.indexOf(App.activeVTab) < 0) App.activeVTab = p.platforms[0];
  tabs.innerHTML = p.platforms.map(function (pid) {
    var pl = platformById(pid);
    var v = variantOf(p, pid);
    var edited = Object.keys(v).some(function (k) { return v[k]; });
    return '<button type="button" data-vtab="' + esc(pid) + '" class="' + (App.activeVTab === pid ? 'active' : '') + '">' +
      esc(pl.name) + (edited ? '<span class="editedmark" title="Customized"></span>' : '') + '</button>';
  }).join('');
  $$('#vTabs [data-vtab]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      App.activeVTab = btn.getAttribute('data-vtab');
      renderVTabs();
    });
  });
  renderVPanel();
}

function ensureVariant(pid) {
  var p = App.editing;
  if (!p.variants[pid]) p.variants[pid] = {};
  return p.variants[pid];
}

function pruneVariant(pid) {
  var p = App.editing;
  var v = p.variants[pid];
  if (v && !Object.keys(v).some(function (k) { return v[k]; })) delete p.variants[pid];
}

function renderVPanel() {
  var p = App.editing;
  var pid = App.activeVTab;
  var panel = $('#vPanel');
  if (!pid) { panel.innerHTML = ''; return; }
  var v = variantOf(p, pid);
  var html = '';
  if (pid === 'youtube') {
    html += '<div class="field"><label>YouTube title <span class="muted" style="text-transform:none">(required to schedule)</span></label>' +
      '<input id="vYtTitle" maxlength="120" placeholder="Video title (max 100 chars)" value="' + esc(v.title || '') + '"></div>';
    html += '<div class="field"><label>YouTube description</label>' +
      '<textarea id="vYtDesc" rows="4" placeholder="Leave empty to use the main caption">' + esc(v.description || '') + '</textarea></div>';
    html += '<div class="field"><label>Tags <span class="muted" style="text-transform:none">(comma separated, 500 chars total)</span></label>' +
      '<input id="vYtTags" placeholder="tag one, tag two" value="' + esc(v.tags || '') + '"></div>';
  } else {
    var pl = platformById(pid);
    html += '<div class="field"><label>' + esc(pl.name) + ' caption override</label>' +
      '<textarea id="vCaption" rows="4" placeholder="Leave empty to use the main caption">' + esc(v.caption || '') + '</textarea></div>';
    if (pid === 'instagram') {
      html += '<div class="field"><label>First comment <span class="muted" style="text-transform:none">(extra hashtags often go here)</span></label>' +
        '<textarea id="vFirstComment" rows="2" placeholder="Posted as the first comment right after publishing">' + esc(v.firstComment || '') + '</textarea></div>';
    }
  }
  panel.innerHTML = html;

  var bind = function (sel, key) {
    var elx = $(sel);
    if (!elx) return;
    elx.addEventListener('input', function () {
      var vv = ensureVariant(pid);
      vv[key] = elx.value;
      if (!elx.value) { delete vv[key]; pruneVariant(pid); }
      markDirty(); updateCounters();
      var tabBtn = $('#vTabs [data-vtab="' + pid + '"]');
      if (tabBtn) {
        var has = Object.keys(variantOf(App.editing, pid)).some(function (k) { return variantOf(App.editing, pid)[k]; });
        var mark = tabBtn.querySelector('.editedmark');
        if (has && !mark) tabBtn.insertAdjacentHTML('beforeend', '<span class="editedmark"></span>');
        if (!has && mark) mark.remove();
      }
    });
  };
  bind('#vCaption', 'caption');
  bind('#vFirstComment', 'firstComment');
  bind('#vYtTitle', 'title');
  bind('#vYtDesc', 'description');
  bind('#vYtTags', 'tags');
}

/* ---------------- media ---------------- */
function revokePreviews() {
  (App.previewUrls || []).forEach(function (u) { try { URL.revokeObjectURL(u); } catch (e) {} });
  App.previewUrls = [];
}

function renderMediaRow() {
  var p = App.editing;
  var row = $('#mediaRow');
  revokePreviews();
  if (!(p.media || []).length) { row.innerHTML = ''; return; }
  row.innerHTML = p.media.map(function (m, i) {
    var meta = [];
    if (m.duration != null) meta.push(fmtDuration(m.duration));
    if (m.size) meta.push(fmtBytes(m.size));
    return '<div class="mediacard" data-media="' + i + '">' +
      '<div class="mthumb" data-mprev="' + i + '" style="display:flex;align-items:center;justify-content:center;color:var(--muted-2)">' +
        (/^video\//.test(m.type) ? '🎬' : '🖼️') + '</div>' +
      '<div class="mname" title="' + esc(m.file) + '">' + esc(m.file) + (meta.length ? ' · ' + meta.join(' · ') : '') + '</div>' +
      '<button type="button" class="mdel" data-mdel="' + i + '" title="Remove">&times;</button>' +
    '</div>';
  }).join('');

  p.media.forEach(function (m, i) {
    getEditingMediaBlob(m.file).then(function (blob) {
      if (!blob) return;
      var url = URL.createObjectURL(blob);
      App.previewUrls.push(url);
      var slot = $('[data-mprev="' + i + '"]');
      if (!slot) { return; }
      if (/^image\//.test(m.type)) {
        slot.outerHTML = '<img class="mthumb" src="' + url + '" alt="">';
      } else if (/^video\//.test(m.type)) {
        slot.outerHTML = '<video class="mthumb" src="' + url + '" muted playsinline></video>';
      }
    });
  });

  $$('#mediaRow [data-mdel]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var i = +btn.getAttribute('data-mdel');
      var m = App.editing.media[i];
      if (!m) return;
      if (App.newMedia.has(m.file)) App.newMedia.delete(m.file);
      else _removedMedia.push(m.file);
      App.editing.media.splice(i, 1);
      if (i === 0) _stagedThumb = App.editing.media.length ? undefined : null;
      markDirty();
      renderMediaRow(); runValidation();
    });
  });
}

function getEditingMediaBlob(name) {
  if (App.newMedia.has(name)) return Promise.resolve(App.newMedia.get(name));
  if (App.editingIsNew) return Promise.resolve(null);
  return App.store.getMediaBlob(App.editing, name);
}

function probeMedia(blob, type) {
  return new Promise(function (res) {
    var url = URL.createObjectURL(blob);
    var done = false;
    var finish = function (meta) {
      if (done) return;
      done = true;
      URL.revokeObjectURL(url);
      res(meta || {});
    };
    setTimeout(function () { finish({}); }, 4000);
    if (/^image\//.test(type)) {
      var img = new Image();
      img.onload = function () { finish({ width: img.naturalWidth, height: img.naturalHeight }); };
      img.onerror = function () { finish({}); };
      img.src = url;
    } else if (/^video\//.test(type)) {
      var v = document.createElement('video');
      v.preload = 'metadata';
      v.muted = true;
      v.onloadedmetadata = function () {
        finish({ duration: isFinite(v.duration) ? v.duration : null, width: v.videoWidth || null, height: v.videoHeight || null });
      };
      v.onerror = function () { finish({}); };
      v.src = url;
    } else {
      finish({});
    }
  });
}

function makeThumb(blob, type) {
  return new Promise(function (res) {
    var url = URL.createObjectURL(blob);
    var done = false;
    var finish = function (out) {
      if (done) return;
      done = true;
      URL.revokeObjectURL(url);
      res(out || null);
    };
    setTimeout(function () { finish(null); }, 5000);
    function draw(source, w, h) {
      try {
        var scale = Math.min(1, 320 / w);
        var c = document.createElement('canvas');
        c.width = Math.max(1, Math.round(w * scale));
        c.height = Math.max(1, Math.round(h * scale));
        c.getContext('2d').drawImage(source, 0, 0, c.width, c.height);
        c.toBlob(function (b) { finish(b); }, 'image/jpeg', 0.78);
      } catch (e) { finish(null); }
    }
    if (/^image\//.test(type)) {
      var img = new Image();
      img.onload = function () { draw(img, img.naturalWidth, img.naturalHeight); };
      img.onerror = function () { finish(null); };
      img.src = url;
    } else if (/^video\//.test(type)) {
      var v = document.createElement('video');
      v.preload = 'auto';
      v.muted = true;
      v.playsInline = true;
      v.onloadeddata = function () {
        var t = Math.min(0.5, (v.duration || 1) / 2);
        var grab = function () { draw(v, v.videoWidth || 320, v.videoHeight || 320); };
        if (Math.abs(v.currentTime - t) < 0.01) grab();
        else { v.onseeked = grab; try { v.currentTime = t; } catch (e) { grab(); } }
      };
      v.onerror = function () { finish(null); };
      v.src = url;
    } else {
      finish(null);
    }
  });
}

function addMediaFiles(fileList) {
  var files = Array.prototype.slice.call(fileList || []);
  if (!files.length) return;
  var p = App.editing;
  var chain = Promise.resolve();
  files.forEach(function (f) {
    if (!/^(image|video)\//.test(f.type)) {
      toast('“' + f.name + '” isn’t an image or video — skipped.', 'err');
      return;
    }
    chain = chain.then(function () {
      var name = sanitizeFileName(f.name);
      var base = name, dot = name.lastIndexOf('.');
      var stem = dot > 0 ? name.slice(0, dot) : name, ext = dot > 0 ? name.slice(dot) : '';
      var n = 2;
      while (p.media.some(function (m) { return m.file === name; })) {
        name = stem + '-' + (n++) + ext;
      }
      return probeMedia(f, f.type).then(function (meta) {
        p.media.push({
          file: name, type: f.type || 'application/octet-stream', size: f.size,
          duration: meta.duration != null ? Math.round(meta.duration * 10) / 10 : undefined,
          width: meta.width || undefined, height: meta.height || undefined
        });
        App.newMedia.set(name, f);
        if (p.media.length === 1 || _stagedThumb === undefined) {
          return makeThumb(f, f.type).then(function (tb) { if (tb) _stagedThumb = tb; });
        }
      });
    });
  });
  chain.then(function () {
    markDirty();
    renderMediaRow();
    runValidation();
  });
}

function convertImageToJpeg(index) {
  var p = App.editing;
  var m = p.media[index];
  if (!m) return;
  getEditingMediaBlob(m.file).then(function (blob) {
    if (!blob) { toast('Couldn’t read that image.', 'err'); return; }
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function () {
      var c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, c.width, c.height); /* transparent PNG -> white background */
      ctx.drawImage(img, 0, 0);
      c.toBlob(function (b) {
        URL.revokeObjectURL(url);
        if (!b) { toast('Conversion failed.', 'err'); return; }
        if (!App.newMedia.has(m.file) && !App.editingIsNew) _removedMedia.push(m.file);
        App.newMedia.delete(m.file);
        var newName = m.file.replace(/\.[^.]*$/, '') + '.jpg';
        var n = 2;
        while (p.media.some(function (x, xi) { return xi !== index && x.file === newName; })) {
          newName = m.file.replace(/\.[^.]*$/, '') + '-' + (n++) + '.jpg';
        }
        m.file = newName; m.type = 'image/jpeg'; m.size = b.size;
        App.newMedia.set(newName, b);
        markDirty();
        renderMediaRow(); runValidation();
        toast('Converted to JPEG ✓', 'ok');
      }, 'image/jpeg', 0.92);
    };
    img.onerror = function () { URL.revokeObjectURL(url); toast('Couldn’t read that image.', 'err'); };
    img.src = url;
  });
}

/* ---------------- validation display ---------------- */
function runValidation() {
  var p = App.editing;
  if (!p) return [];
  syncWhen();
  var msgs = validatePost(p, { forSchedule: p.status === 'scheduled' || _pendingSchedule, now: Date.now() });
  var box = $('#vMsgs');
  box.innerHTML = msgs.map(function (m, i) {
    var icon = m.level === 'error' ? '⛔' : m.level === 'warn' ? '⚠️' : 'ℹ️';
    var fix = '';
    if (m.code === 'ig-jpeg') {
      var idx = p.media.findIndex(function (x) { return /^image\//.test(x.type) && x.type !== 'image/jpeg'; });
      if (idx >= 0) fix = '<button type="button" class="btn small fix" data-fix-jpeg="' + idx + '">Convert to JPEG</button>';
    }
    return '<div class="vmsg ' + m.level + '"><span>' + icon + '</span><span>' + esc(m.msg) + '</span>' + fix + '</div>';
  }).join('');
  $$('#vMsgs [data-fix-jpeg]').forEach(function (btn) {
    btn.addEventListener('click', function () { convertImageToJpeg(+btn.getAttribute('data-fix-jpeg')); });

}

var _pendingSchedule = false;

/* ---------------- save & delete ---------------- */
function collectFormIntoEditing() {
  var p = App.editing;
  p.title = $('#fTitle').value.trim();
  p.caption = $('#fCaption').value;
  p.notes = $('#fNotes').value.trim();
  p.label = $('#fLabel').value;
  syncWhen();
}

function saveEditing(targetStatus) {
  var p = App.editing;
  if (!p) return Promise.resolve();
  collectFormIntoEditing();
  var was = p.status;
  if (targetStatus) p.status = targetStatus;

  var msgs = validatePost(p, { forSchedule: targetStatus === 'scheduled', now: Date.now() });
  var errs = msgs.filter(function (m) { return m.level === 'error'; });
  if (targetStatus === 'scheduled' && errs.length) {
    p.status = was;
    /* keep schedule-level validation visible (and live) until issues are fixed */
    _pendingSchedule = true;
    runValidation();
    toast('Fix the ' + (errs.length === 1 ? 'issue' : errs.length + ' issues') + ' in red before scheduling.', 'err');
    return Promise.resolve();
  }
  _pendingSchedule = false;
  if (targetStatus === 'scheduled') {
    /* re-scheduling clears old failure flags */
    Object.keys(p.results || {}).forEach(function (k) {
      if (p.results[k] && !p.results[k].ok) delete p.results[k];
    });
  }

  var doSave = function () {
    var oldFolderName = (App.store.dirOf && App.store.dirOf[p.id]) ? App.store.dirOf[p.id].name : null;
    return App.store.savePost(p, App.newMedia).then(function () {
      var ops = [];
      _removedMedia.forEach(function (name) {
        ops.push(App.store.removeMediaFile(p, name));
      });
      if (_stagedThumb instanceof Blob) ops.push(App.store.putThumb(p.id, _stagedThumb));
      return Promise.all(ops);
    }).then(function () {
      var i = App.posts.findIndex(function (x) { return x.id === p.id; });
      if (i >= 0) App.posts[i] = p; else App.posts.push(p);
      invalidateThumb(p.id);
      App.newMedia = new Map();
      _removedMedia = [];
      _stagedThumb = undefined;
      _dirty = false;
      App.editingIsNew = false;
      App.editingOriginalUpdatedAt = p.updatedAt;
      maybeAskNotifications(targetStatus);
      toast(targetStatus === 'scheduled' ? 'Scheduled ✓' : 'Saved ✓', 'ok');
      closeComposer(true);
      render();
      Cloud.onSaved(p, oldFolderName);
    });
  };

  /* conflict check: did autopilot (or another window) change this post since we opened it? */
  var pre = (!App.editingIsNew && App.store.peekPost)
    ? App.store.peekPost(p.id)
    : Promise.resolve(null);

  return pre.then(function (onDisk) {
    if (onDisk && App.editingOriginalUpdatedAt && onDisk.updatedAt !== App.editingOriginalUpdatedAt) {
      return confirmModal('This post changed on disk',
        'It looks like autopilot (or another window) updated this post while you were editing. Saving now will overwrite those updates. Save anyway?',
        'Save anyway').then(function (yes) {
          if (yes) return doSave();
          p.status = was;
        });
    }
    return doSave();
  }).catch(function (err) {
    p.status = was;
    toast('Save failed: ' + (err && err.message ? err.message : err), 'err');
  });
}

function saveExistingPost(post) {
  post.updatedAt = new Date().toISOString();
  var oldFolderName = (App.store.dirOf && App.store.dirOf[post.id]) ? App.store.dirOf[post.id].name : null;
  return App.store.savePost(post, null).then(function (r) {
    Cloud.onSaved(post, oldFolderName);
    return r;
  });
}

function deleteEditing() {
  var p = App.editing;
  if (!p || App.editingIsNew) return;
  confirmModal('Delete this post?', '“' + (p.title || 'Untitled') + '” and its media files will be removed' +
    (App.store.kind === 'folder' ? ' from your folder' : '') + '. This can’t be undone.', 'Delete').then(function (yes) {
    if (!yes) return;
    var folderName = (App.store.dirOf && App.store.dirOf[p.id]) ? App.store.dirOf[p.id].name : null;
    App.store.deletePost(p).then(function () {
      App.posts = App.posts.filter(function (x) { return x.id !== p.id; });
      invalidateThumb(p.id);
      toast('Post deleted', 'ok');
      closeComposer(true);
      render();
      Cloud.onDeleted(folderName);
    }).catch(function (err) { toast('Delete failed: ' + err.message, 'err'); });
  });
}

function duplicateEditing() {
  var src = App.editing;
  if (!src || App.editingIsNew) return;
  if (_dirty) { toast('Save your changes first, then duplicate.', 'err'); return; }
  var copy = normalizePost(JSON.parse(JSON.stringify(src)));
  copy.id = uid();
  copy.title = (src.title || 'Untitled') + ' (copy)';
  copy.status = 'draft';
  copy.results = {};
  copy.createdAt = new Date().toISOString();
  var mediaCopies = new Map();
  var chain = Promise.resolve();
  (src.media || []).forEach(function (m) {
    chain = chain.then(function () {
      return App.store.getMediaBlob(src, m.file).then(function (blob) {
        if (blob) mediaCopies.set(m.file, blob);
        else copy.media = copy.media.filter(function (x) { return x.file !== m.file; });
      });
    });
  });
  chain.then(function () {
    return App.store.savePost(copy, mediaCopies);
  }).then(function () {
    return App.store.getThumb(src.id).then(function (tb) {
      if (tb) return App.store.putThumb(copy.id, tb);
    });
  }).then(function () {
    App.posts.push(copy);
    Cloud.onSaved(copy, null);
    toast('Duplicated — opening the copy', 'ok');
    closeComposer(true);
    render();
    openComposer(copy.id);
  }).catch(function (err) { toast('Duplicate failed: ' + err.message, 'err'); });
}

function duePosts() {

function renderDueBanner() {
  var due = duePosts().filter(function (p) { return !App.dueDismissedIds[p.id]; });

  if (!due.length) {

function startTitleFlash(n) {
  if (_titleFlasher) return;
  var on = false;
  _titleFlasher = setInterval(function () {
    document.title = on ? BASE_TITLE : '🔔 ' + n + ' due — ' + BASE_TITLE;
    on = !on;
  }, 1200);
}

function stopTitleFlash() {
  if (_titleFlasher) { clearInterval(_titleFlasher); _titleFlasher = null; }
  document.title = BASE_TITLE;
}

function beep() {
  try {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    var ctx = new Ctx();
    [0, 0.18].forEach(function (t0) {
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = 880;
      g.gain.setValueAtTime(0.0001, ctx.currentTime + t0);
      g.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t0 + 0.15);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + t0); o.stop(ctx.currentTime + t0 + 0.16);
    });
    setTimeout(function () { ctx.close().catch(function () {}); }, 800);
  } catch (e) {}
}

function checkDueTick() {
  var due = duePosts();
  var newOnes = due.filter(function (p) { return !App.settings.notifiedIds[p.id]; });
  if (newOnes.length) {
    newOnes.forEach(function (p) { App.settings.notifiedIds[p.id] = Date.now(); });
    /* keep the notified ledger from growing forever */
    var ids = Object.keys(App.settings.notifiedIds);
    if (ids.length > 400) {
      ids.sort(function (a, b) { return App.settings.notifiedIds[a] - App.settings.notifiedIds[b]; })
        .slice(0, ids.length - 200).forEach(function (id) { delete App.settings.notifiedIds[id]; });
    }
    App.store.saveSettings(App.settings).catch(function () {});
    beep();
    newOnes.forEach(function (p) { systemNotify(p); });
  }
  renderDueBanner();
}

function systemNotify(post) {
  try {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    var n = new Notification('Time to post: ' + (post.title || 'Untitled'), {
      body: (post.platforms || []).map(platformDisplayName).join(', ') + ' · ' + fmtTime12(post.when.local),
      tag: 'sas-' + post.id
    });
    n.onclick = function () {
      try { window.focus(); } catch (e) {}
      openPostNow(post.id);
      n.close();
    };
  } catch (e) {}
}

function maybeAskNotifications(targetStatus) {
  if (targetStatus !== 'scheduled') return;
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'default' || App.settings.askedNotif) return;
  App.settings.askedNotif = true;
  App.store.saveSettings(App.settings).catch(function () {});
  showModal('Get a ping when it’s time?',

    '<p class="muted small" style="margin-top:8px">Tip: keep this tab pinned. For posting while your computer is off, set up the GitHub autopilot (see the setup guide in your folder).</p>',
    [
      { label: 'Not now', onClick: function () { closeModal(); } },

          });

}

var PLATFORM_OPEN_URLS = {
  instagram: 'https://www.instagram.com/',

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text).then(function () { return true; }, function () { return legacyCopy(text); });
  }
  return Promise.resolve(legacyCopy(text));
}

function legacyCopy(text) {
  try {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    var ok = document.execCommand('copy');
    ta.remove();
    return ok;
  } catch (e) { return false; }
}

function openDueList() {

function openPostNow(postId) {

      '<div class="pn-head"><span class="pdot ' + cls + '"' + dotStyle + '></span>' + esc(pl.name) +
        (done ? ' <span class="statusbadge sb-published">Posted</span>' : '') +
        (results[pid] && results[pid].ok === false ? ' <span class="statusbadge sb-failed" title="' + esc(results[pid].error || '') + '">Failed</span>' : '') +
      '</div>' +

  showModal('Post now — ' + (post.title || 'Untitled'), body, [
    { label: 'Snooze 1 hour', onClick: function () { snoozePost(post, 60); } },
    { label: 'Open in editor', onClick: function () { closeModal(); openComposer(post.id); } },

  $$('#modalBody [data-copy]').forEach(function (btn) {

  var fcBtn = $('#modalBody [data-copyfc]');
  if (fcBtn) fcBtn.addEventListener('click', function () {

  $$('#modalBody [data-open]').forEach(function (btn) {
    btn.addEventListener('click', function () {

  $$('#modalBody [data-dl]').forEach(function (btn) {

        if (!blob) { toast('File not found in storage', 'err'); return; }

        if (post.status === 'published') post.status = 'scheduled';
      } else {
        post.results[pid] = { ok: true, manual: true, at: new Date().toISOString() };
        var allDone = (post.platforms || []).every(function (q) { return post.results[q] && post.results[q].ok; });
        if (allDone) post.status = 'published';
      }
      saveExistingPost(post).then(function () {
        render();
        openPostNow(post.id); /* refresh the modal */
        if (post.status === 'published') toast('All platforms posted — marked Published 🎉', 'ok');
      }).catch(function (err) { toast('Couldn’t save: ' + err.message, 'err'); });
    });
  });
}

function snoozePost(post, minutes) {
  var t = postUtcMs(post);
  var base = isNaN(t) ? Date.now() : Math.max(t, Date.now());
  var newUtc = base + minutes * 60000;
  post.when.local = utcToZonedISO(newUtc, post.when.tz || App.settings.tz);
  delete App.settings.notifiedIds[post.id];
  saveExistingPost(post).then(function () {
    App.store.saveSettings(App.settings).catch(function () {});
    closeModal();
    toast('Snoozed to ' + fmtTime12(post.when.local), 'ok');
    render();
  }).catch(function (err) { toast('Couldn’t snooze: ' + err.message, 'err'); });
}

function downloadBlob(blob, name) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(function () { a.remove(); URL.revokeObjectURL(url); }, 4000);
}
