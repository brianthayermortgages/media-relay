/* ---------------- backup & restore ---------------- */
function collectBackupEntries() {
  var enc = new TextEncoder();
  var entries = [{
    name: 'manifest.json',
    data: enc.encode(JSON.stringify({ app: 'socials-auto-scheduler', schemaVersion: SCHEMA_VERSION, exportedAt: new Date().toISOString(), posts: App.posts.length }, null, 2))
  }, {
    name: 'settings.json',
    data: enc.encode(JSON.stringify(App.settings, null, 2))
  }];
  var chain = Promise.resolve();
  var usedNames = {};
  App.posts.forEach(function (p) {
    /* two posts can share a date+title — keep every one of them distinct in the zip */
    var base = folderNameFor(p), folder = base, suffix = 98;
    while (usedNames[folder]) {
      folder = base + '-' + String.fromCharCode(suffix++);
      if (suffix > 122) { folder = base + '-' + p.id; break; }
    }
    usedNames[folder] = true;
    var dir = 'content/' + folder + '/';
    entries.push({ name: dir + 'post.json', data: enc.encode(JSON.stringify(p, null, 2)) });
    var human = buildHumanFiles(p);
    Object.keys(human).forEach(function (name) {
      entries.push({ name: dir + name, data: enc.encode(human[name]) });
    });
    (p.media || []).forEach(function (m) {
      chain = chain.then(function () {
        return App.store.getMediaBlob(p, m.file).then(function (blob) {
          if (!blob) return;
          return blob.arrayBuffer().then(function (buf) {
            entries.push({ name: dir + m.file, data: new Uint8Array(buf) });
          });
        });
      });
    });
  });
  return chain.then(function () { return entries; });
}

function downloadBackupZip() {
  toast('Building backup…');
  collectBackupEntries().then(function (entries) {
    var total = entries.reduce(function (a, e) { return a + e.data.length; }, 0);
    if (total > 3.5 * 1073741824) {
      toast('Backup is over 3.5 GB — too big for a .zip. Copy your whole folder instead (it IS the backup).', 'err');
      return;
    }
    var zip = buildZip(entries);
    var d = new Date();
    var name = 'socials-backup-' + d.getFullYear() + pad2(d.getMonth() + 1) + pad2(d.getDate()) + '-' + pad2(d.getHours()) + pad2(d.getMinutes()) + '.zip';
    downloadBlob(new Blob([zip], { type: 'application/zip' }), name);
    App.settings.lastBackup = new Date().toISOString();
    persistSettings();
    toast('Backup downloaded ✓ (' + fmtBytes(zip.length) + ')', 'ok');
  }).catch(function (err) {
    toast('Backup failed: ' + (err && err.message ? err.message : err), 'err');
  });
}

function exportJson() {
  var data = { app: 'socials-auto-scheduler', schemaVersion: SCHEMA_VERSION, exportedAt: new Date().toISOString(), settings: App.settings, posts: App.posts };
  var d = new Date();
  var name = 'socials-export-' + d.getFullYear() + pad2(d.getMonth() + 1) + pad2(d.getDate()) + '.json';
  downloadBlob(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }), name);
  toast('Export downloaded ✓ (captions & schedule only — media stays in your folder/backups)', 'ok');
}

function handleImportFile(file) {
  if (!file) return;
  if (/\.json$/i.test(file.name)) {
    file.text().then(function (txt) {
      var data = JSON.parse(txt);
      var posts = (data.posts || []).map(normalizePost);
      if (!posts.length) { toast('No posts found in that file.', 'err'); return; }
      confirmModal('Import ' + posts.length + ' posts?',
        'Posts with matching IDs are updated to whichever copy is newer; everything else is added. Media files aren’t in .json exports — import the .zip backup for those.', 'Import').then(function (yes) {
        if (!yes) return;
        mergePosts(posts, null).then(function (stats) {
          mergeSettings(data.settings);
          toast('Imported: ' + stats.added + ' added, ' + stats.updated + ' updated ✓', 'ok');
          populateFilters(); render();
        });
      });
    }).catch(function (err) { toast('Couldn’t read that file: ' + err.message, 'err'); });
  } else if (/\.zip$/i.test(file.name)) {
    file.arrayBuffer().then(function (buf) {
      var entries = parseZip(new Uint8Array(buf));
      var dec = new TextDecoder();
      var byDir = {};
      var settings = null;
      entries.forEach(function (e) {
        if (e.name === 'settings.json') { try { settings = JSON.parse(dec.decode(e.data)); } catch (x) {} return; }
        var m = /^content\/([^\/]+)\/(.+)$/.exec(e.name);
        if (!m) return;
        (byDir[m[1]] = byDir[m[1]] || []).push({ name: m[2], data: e.data });
      });
      var posts = [], mediaMaps = {};
      Object.keys(byDir).forEach(function (dir) {
        var pj = byDir[dir].find(function (f) { return f.name === 'post.json'; });
        if (!pj) return;
        try {
          var p = normalizePost(JSON.parse(dec.decode(pj.data)));
          posts.push(p);
          var mm = new Map();
          (p.media || []).forEach(function (m2) {
            var f = byDir[dir].find(function (x) { return x.name === m2.file; });
            if (f) mm.set(m2.file, new Blob([f.data], { type: m2.type || 'application/octet-stream' }));
          });
          mediaMaps[p.id] = mm;
        } catch (x) {}
      });
      if (!posts.length) { toast('No posts found in that backup.', 'err'); return; }
      confirmModal('Restore ' + posts.length + ' posts from backup?',
        'Posts with matching IDs are updated to whichever copy is newer; everything else is added — media files included.', 'Restore').then(function (yes) {
        if (!yes) return;
        toast('Restoring…');
        mergePosts(posts, mediaMaps).then(function (stats) {
          mergeSettings(settings);
          toast('Restored: ' + stats.added + ' added, ' + stats.updated + ' updated ✓', 'ok');
          populateFilters(); render();
        }).catch(function (err) { toast('Restore failed: ' + err.message, 'err'); });
      });
    }).catch(function (err) { toast('Couldn’t read that zip: ' + (err && err.message ? err.message : err), 'err'); });
  } else {
    toast('Import a .json export or .zip backup made by this app.', 'err');
  }
}

function mergePosts(incoming, mediaMaps) {
  var added = 0, updated = 0;
  var chain = Promise.resolve();
  incoming.forEach(function (p) {
    chain = chain.then(function () {
      var existing = App.posts.find(function (x) { return x.id === p.id; });
      var mm = mediaMaps ? (mediaMaps[p.id] || new Map()) : null;
      if (existing) {
        if ((existing.updatedAt || '') >= (p.updatedAt || '')) {
          /* ours is newer — still pull in any media files we don't have */
          if (mm && mm.size) return App.store.savePost(existing, mm);
          return;
        }
        updated++;
        var i = App.posts.indexOf(existing);
        App.posts[i] = p;
        return App.store.savePost(p, mm);
      }
      added++;
      App.posts.push(p);
      return App.store.savePost(p, mm);
    });
  });
  return chain.then(function () { return { added: added, updated: updated }; });
}

function mergeSettings(incoming) {
  if (!incoming) return;
  var s = App.settings;
  (incoming.labels || []).forEach(function (l) {
    if (l && l.name && !s.labels.some(function (x) { return x.name === l.name; })) s.labels.push({ name: l.name, color: l.color || '#9aa4b8' });
  });
  (incoming.hashGroups || []).forEach(function (g) {
    if (g && g.name && !s.hashGroups.some(function (x) { return x.name === g.name; })) s.hashGroups.push({ name: g.name, tags: g.tags || '' });
  });
  (incoming.customPlatforms || []).forEach(function (p) {
    if (p && p.id && !s.customPlatforms.some(function (x) { return x.id === p.id; })) s.customPlatforms.push(p);
  });
  persistSettings();
}

/* ---------------- folder connection ---------------- */
function verifyPermission(handle) {
  return handle.queryPermission({ mode: 'readwrite' }).then(function (p) {
    if (p === 'granted') return true;
    return handle.requestPermission({ mode: 'readwrite' }).then(function (p2) { return p2 === 'granted'; });
  });
}

function connectFolderFlow() {
  if (!FolderStore.isSupported()) {
    toast('Folder mode needs Chrome or Edge.', 'err');
    return;
  }
  window.showDirectoryPicker({ mode: 'readwrite' }).then(function (handle) {
    return verifyPermission(handle).then(function (ok) {
      if (!ok) { toast('Folder permission was declined.', 'err'); return; }
      var oldStore = App.store, oldPosts = App.posts.slice();
      try { localStorage.removeItem('sas-mode'); } catch (e) {}
      var fs = new FolderStore(handle);
      return fs.init().then(function () {
        return FolderStore.saveHandle(handle);
      }).then(function () {
        return switchToStore(fs);
      }).then(function () {
        closeModal();
        /* offer migration when the folder is empty but browser storage had posts */
        if (oldStore && oldStore.kind === 'browser' && oldPosts.length && App.posts.length === 0) {
          confirmModal('Move your ' + oldPosts.length + ' posts into the folder?',
            'They’ll be written as real files (post.json + captions + media) inside “' + (handle.name || 'your folder') + '/content”.', 'Move them').then(function (yes) {
            if (!yes) return;
            var chain = Promise.resolve();
            oldPosts.forEach(function (p) {
              chain = chain.then(function () {
                var mm = new Map();
                var sub = Promise.resolve();
                (p.media || []).forEach(function (m) {
                  sub = sub.then(function () {
                    return oldStore.getMediaBlob(p, m.file).then(function (b) { if (b) mm.set(m.file, b); });
                  });
                });
                return sub.then(function () {
                  return App.store.savePost(p, mm);
                }).then(function () {
                  return oldStore.getThumb(p.id).then(function (tb) { if (tb) return App.store.putThumb(p.id, tb); });
                }).then(function () {
                  App.posts.push(p);
                });
              });
            });
            chain.then(function () {
              toast('Moved ' + oldPosts.length + ' posts into your folder ✓', 'ok');
              render();
            }).catch(function (err) { toast('Move hit a snag: ' + err.message, 'err'); });
          });
        }
      });
    });
  }).catch(function (err) {
    if (err && err.name === 'AbortError') return; /* user cancelled the picker */
    toast('Couldn’t open that folder: ' + (err && err.message ? err.message : err), 'err');
  });
}

function switchToStore(store) {
  App.store = store;
  App.thumbUrls = {};
  return store.getSettings().then(function (s) {
    if (s) {
      App.settings = Object.assign(defaultSettings(), s);
      App.settings.notifiedIds = App.settings.notifiedIds || {};
    } else {
      App.settings = App.settings || defaultSettings();
      return store.saveSettings(App.settings);
    }
  }).then(function () {
    return store.listPosts();
  }).then(function (r) {
    App.posts = r.posts;
    r.problems.forEach(function (msg) { toast(msg, 'err'); });
    updateStorageChip();
    populateFilters();
    render();
    setCloudStatus('ok');
    if (Cloud.configured()) {
      Cloud.pullStatuses();
      Cloud.retryQueue();
    }
  });
}

function updateStorageChip() {
  var chip = $('#storageChip');
  if (App.store && App.store.kind === 'folder') {
    chip.className = 'chip storage-chip connected';
    chip.innerHTML = '📁 ' + esc(App.store.label());
    chip.title = 'Your posts live as real files in this folder. Click for storage settings.';
  } else {
    chip.className = 'chip storage-chip browser';
    chip.innerHTML = '💾 Browser storage — connect a folder';
    chip.title = 'Posts are inside this browser only. Click to connect a real folder.';
  }
}

/* ---------------- welcome ---------------- */
function renderWelcome(reconnectHandle) {
  var html = '<div class="welcome">' +
    '<div class="logo" style="font-size:19px"><span class="glyph" style="width:38px;height:38px;font-size:19px">✈</span> Socials Auto Scheduler</div>' +
    '<p class="muted">Plan a month and a half of Instagram, Facebook, TikTok & YouTube in one calendar. Everything is saved as real files you own — nothing leaves your computer.</p>';
  if (reconnectHandle) {
    html += '<div class="opt" id="optReconnect"><span class="ic">📁</span><div>' +
      '<h3>Continue with “' + esc(reconnectHandle.name || 'your folder') + '”</h3>' +
      '<p>Pick up right where you left off (your browser will ask you to allow access again — one click).</p></div></div>';
  }
  if (FolderStore.isSupported()) {
    html += '<div class="opt" id="optFolder"><span class="ic">🗂️</span><div>' +
      '<h3>' + (reconnectHandle ? 'Use a different folder…' : 'Connect your folder (recommended)') + '</h3>' +
      '<p>Choose your “Socials Auto Scheduler” folder. Every post becomes a dated folder with the video, captions and details inside — your filing system and backup in one.</p></div></div>';
  }
  html += '<div class="opt" id="optBrowser"><span class="ic">⚡</span><div>' +
    '<h3>Quick start with browser storage</h3>' +
    '<p>Jump straight in. You can connect a folder later from Settings' +
    (FolderStore.isSupported() ? '' : ' (folder mode needs Chrome or Edge)') + '.</p></div></div>';
  html += '</div>';
  $('#main').innerHTML = html;
  $('#navLabel').textContent = 'Welcome';

  var rc = $('#optReconnect');
  if (rc) rc.addEventListener('click', function () {
    verifyPermission(reconnectHandle).then(function (ok) {
      if (!ok) { toast('Folder permission was declined — choose an option below.', 'err'); return; }
      var fs = new FolderStore(reconnectHandle);
      fs.init().then(function () { return switchToStore(fs); }).then(finishBoot)
        .catch(function (err) { toast('Couldn’t open the folder: ' + err.message, 'err'); });
    });
  });
  var of = $('#optFolder');
  if (of) of.addEventListener('click', function () {
    window.showDirectoryPicker({ mode: 'readwrite' }).then(function (handle) {
      return verifyPermission(handle).then(function (ok) {
        if (!ok) { toast('Folder permission was declined.', 'err'); return; }
        var fs = new FolderStore(handle);
        return fs.init().then(function () { return FolderStore.saveHandle(handle); })
          .then(function () { return switchToStore(fs); }).then(finishBoot);
      });
    }).catch(function (err) {
      if (err && err.name !== 'AbortError') toast('Couldn’t open that folder: ' + err.message, 'err');
    });
  });
  $('#optBrowser').addEventListener('click', function () {
    try { localStorage.setItem('sas-mode', 'browser'); } catch (e) {}
    new IdbStore().init().then(function (store) {
      return switchToStore(store);
    }).then(finishBoot).catch(function (err) { toast('Storage error: ' + err.message, 'err'); });
  });
}

/* ---------------- boot ---------------- */
function finishBoot() {
  if (App.bootDone) return;
  App.bootDone = true;
  setInterval(checkDueTick, 30000);
  checkDueTick();
  /* refresh from disk when the window regains focus (autopilot may have updated posts) */
  var lastFocusReload = 0;
  window.addEventListener('focus', function () {
    if (!App.store || App.store.kind !== 'folder' || App.editing) return;
    var now = Date.now();
    if (now - lastFocusReload < 8000) return;
    lastFocusReload = now;
    App.store.listPosts().then(function (r) {
      App.posts = r.posts;
      App.thumbUrls = {};
      render();
      if (Cloud.configured()) { Cloud.pullStatuses(); Cloud.retryQueue(); }
    }).catch(function () {});
  });
}

function wireStaticEvents() {
  $$('#viewSeg button').forEach(function (btn) {
    btn.addEventListener('click', function () {
      App.view = btn.getAttribute('data-view');
      try { localStorage.setItem('sas-view', App.view); } catch (e) {}
      $$('#viewSeg button').forEach(function (b) { b.classList.toggle('active', b === btn); });
      render();
    });
  });
  $('#navPrev').addEventListener('click', function () { stepCursor(-1); });
  $('#navNext').addEventListener('click', function () { stepCursor(1); });
  $('#navToday').addEventListener('click', function () { App.cursor = new Date(); render(); });
  $('#newPostBtn').addEventListener('click', function () {
    if (!App.bootDone) { toast('Choose where to keep your posts first (one of the options below).', 'err'); return; }
    openComposer(null, null);
  });
  $('#settingsBtn').addEventListener('click', function () {
    if (!App.bootDone) { toast('Pick a storage option first.', 'err'); return; }
    openSettings();
  });
  $('#backupBtn').addEventListener('click', function () {
    if (!App.bootDone) return;
    downloadBackupZip();
  });
  $('#storageChip').addEventListener('click', function () {
    if (!App.bootDone) return;
    openSettings('storage');
  });
  var cloudChipEl = $('#cloudChip');
  if (cloudChipEl) cloudChipEl.addEventListener('click', function () {
    if (!App.bootDone) return;
    if (Cloud.queue.length) {
      Cloud.retryQueue().then(function () { toast(Cloud.queue.length ? 'Some posts still need syncing — check Settings → Auto-publish' : 'Cloud sync complete ✓', Cloud.queue.length ? 'err' : 'ok'); });
    } else openSettings('cloud');
  });

  ['fltPlatform', 'fltStatus', 'fltLabel'].forEach(function (id) {
    $('#' + id).addEventListener('change', function () {
      App.filters.platform = $('#fltPlatform').value;
      App.filters.status = $('#fltStatus').value;
      App.filters.label = $('#fltLabel').value;
      render();
    });
  });
  var searchTimer = null;
  $('#fltSearch').addEventListener('input', function () {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function () {
      App.filters.q = $('#fltSearch').value.trim();
      render();
    }, 180);
  });

  $('#dueReview').addEventListener('click', openDueList);
  $('#dueDismiss').addEventListener('click', function () {
    duePosts().forEach(function (p) { App.dueDismissedIds[p.id] = true; });
    renderDueBanner();
  });

  /* drawer */
  $('#drawerClose').addEventListener('click', function () { closeComposer(); });
  $('#scrim').addEventListener('click', function () { closeComposer(); });
  $('#saveDraftBtn').addEventListener('click', function () {
    saveEditing(App.editing && App.editing.status === 'published' ? 'published' : 'draft');
  });
  $('#saveReadyBtn').addEventListener('click', function () { saveEditing('ready'); });
  $('#scheduleBtn').addEventListener('click', function () { saveEditing('scheduled'); });
  $('#deleteBtn').addEventListener('click', deleteEditing);
  $('#duplicateBtn').addEventListener('click', duplicateEditing);

  ['fTitle', 'fCaption', 'fNotes'].forEach(function (id) {
    $('#' + id).addEventListener('input', function () {
      collectFormIntoEditing();
      markDirty();
      if (id === 'fCaption') updateCounters();
    });
  });
  $('#fLabel').addEventListener('change', function () { collectFormIntoEditing(); markDirty(); });
  $('#fDate').addEventListener('change', function () { syncWhen(); markDirty(); renderBestTimes(); });
  $('#fTime').addEventListener('change', function () { syncWhen(); markDirty(); });

  /* media */
  $('#dropzone').addEventListener('click', function () { $('#fileInput').click(); });
  $('#fileInput').addEventListener('change', function () {
    addMediaFiles(this.files);
    this.value = '';
  });
  var dz = $('#dropzone');
  ['dragover', 'dragenter'].forEach(function (ev) {
    dz.addEventListener(ev, function (e) { e.preventDefault(); dz.classList.add('dragover'); });
  });
  ['dragleave', 'drop'].forEach(function (ev) {
    dz.addEventListener(ev, function (e) { e.preventDefault(); dz.classList.remove('dragover'); });
  });
  dz.addEventListener('drop', function (e) {
    if (e.dataTransfer && e.dataTransfer.files) addMediaFiles(e.dataTransfer.files);
  });
  /* don't let stray drops navigate the page away */
  window.addEventListener('dragover', function (e) { e.preventDefault(); });
  window.addEventListener('drop', function (e) { e.preventDefault(); });

  /* modal */
  $('#modalClose').addEventListener('click', closeModal);
  $('#modalWrap').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });

  /* import */
  $('#importInput').addEventListener('change', function () {
    if (this.files && this.files[0]) handleImportFile(this.files[0]);
    this.value = '';
  });

  /* keyboard */
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      if ($('#modalWrap').classList.contains('open')) { closeModal(); return; }
      if ($('#drawer').classList.contains('open')) closeComposer();
      return;
    }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's' && $('#drawer').classList.contains('open')) {
      e.preventDefault();
      saveEditing(App.editing ? (App.editing.status === 'published' ? 'published' : App.editing.status) : 'draft');
    }
  });

  window.addEventListener('beforeunload', function (e) {
    if (_dirty && $('#drawer').classList.contains('open')) {
      e.preventDefault();
      e.returnValue = '';
    }
  });
}

function stepCursor(dir) {
  var c = App.cursor;
  if (App.view === 'week') App.cursor = new Date(c.getFullYear(), c.getMonth(), c.getDate() + 7 * dir);
  else App.cursor = new Date(c.getFullYear(), c.getMonth() + dir, 1);
  render();
}

function boot() {
  try { App.view = localStorage.getItem('sas-view') || 'month'; } catch (e) {}
  $$('#viewSeg button').forEach(function (b) {
    b.classList.toggle('active', b.getAttribute('data-view') === App.view);
  });
  App.settings = defaultSettings();
  Cloud.load();
  wireStaticEvents();
  updateStorageChip();
  setCloudStatus('ok');

  FolderStore.loadHandle().then(function (handle) {
    if (handle && FolderStore.isSupported()) {
      return handle.queryPermission({ mode: 'readwrite' }).then(function (perm) {
        if (perm === 'granted') {
          var fs = new FolderStore(handle);
          return fs.init().then(function () { return switchToStore(fs); }).then(finishBoot)
            .catch(function (err) {
              toast('Couldn’t open your folder (' + err.message + ') — choose again.', 'err');
              renderWelcome(null);
            });
        }
        renderWelcome(handle);
      }, function () { renderWelcome(null); });
    }
    /* no saved folder: resume browser storage if it was chosen before or has posts */
    var mode = null;
    try { mode = localStorage.getItem('sas-mode'); } catch (e) {}
    return new IdbStore().init().then(function (store) {
      return store.listPosts().then(function (r) {
        if (mode === 'browser' || r.posts.length) {
          return switchToStore(store).then(finishBoot);
        }
        renderWelcome(null);
      });
    });
  }).catch(function () {
    renderWelcome(null);
  });
}

document.addEventListener('DOMContentLoaded', boot);

</script>
</body>
</html>
